<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💕 A Special Place For Us</title>
    <meta name="description" content="A secret love sanctuary crafted just for you and me.">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Cormorant+Garamond:wght@300;400;500;600&family=Dancing+Script:wght@400;500;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --rose: #e8547a;
            --deep-rose: #c0325a;
            --blush: #ffd6e0;
            --gold: #f5c842;
            --soft-gold: #f0d080;
            --cream: #fff8f3;
            --dark: #1a0a10;
            --wine: #5c0a24;
            --glow: rgba(232, 84, 122, 0.6);
        }

        body {
            min-height: 100vh;
            font-family: 'Lato', sans-serif;
            overflow: hidden;
            background: radial-gradient(ellipse at 20% 50%, #3d0c20 0%, #1a0a10 40%, #0d0508 100%);
            cursor: default;
        }

        /* === CANVAS LAYER === */
        #petalCanvas {
            position: fixed; inset: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* === ATMOSPHERIC GLOW LAYERS === */
        .atmo-layer {
            position: fixed; inset: 0; z-index: 1; pointer-events: none;
        }
        .atmo-layer::before {
            content: '';
            position: absolute;
            width: 600px; height: 600px;
            top: -100px; left: -100px;
            background: radial-gradient(circle, rgba(200,40,80,0.12) 0%, transparent 70%);
            animation: driftGlow 12s ease-in-out infinite alternate;
        }
        .atmo-layer::after {
            content: '';
            position: absolute;
            width: 500px; height: 500px;
            bottom: -80px; right: -80px;
            background: radial-gradient(circle, rgba(245,200,66,0.08) 0%, transparent 70%);
            animation: driftGlow 15s ease-in-out infinite alternate-reverse;
        }
        @keyframes driftGlow {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(60px, 40px) scale(1.2); }
        }

        /* === SVG DECORATIVE ELEMENTS === */
        .deco-top-left, .deco-top-right {
            position: fixed; top: 0; z-index: 2; pointer-events: none;
            opacity: 0.55;
        }
        .deco-top-left { left: 0; }
        .deco-top-right { right: 0; transform: scaleX(-1); }

        .deco-bottom-left, .deco-bottom-right {
            position: fixed; bottom: 0; z-index: 2; pointer-events: none;
            opacity: 0.45;
        }
        .deco-bottom-left { left: 0; transform: scaleY(-1); }
        .deco-bottom-right { right: 0; transform: scale(-1); }

        /* === STARS === */
        .stars-layer {
            position: fixed; inset: 0; z-index: 1; pointer-events: none;
            overflow: hidden;
        }
        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle var(--dur) ease-in-out infinite;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.15; transform: scale(0.8); }
            50% { opacity: 0.9; transform: scale(1.3); }
        }

        /* === MAIN LOGIN CONTAINER === */
        .login-wrapper {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* === ROSE SVG ABOVE CARD === */
        .hero-rose {
            margin-bottom: -20px;
            position: relative;
            z-index: 11;
            animation: roseSway 6s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(232,84,122,0.5));
        }
        @keyframes roseSway {
            0%, 100% { transform: rotate(-3deg) translateY(0); }
            50% { transform: rotate(3deg) translateY(-8px); }
        }

        /* === GLASSMORPHISM CARD === */
        .login-card {
            background: linear-gradient(
                135deg,
                rgba(255, 255, 255, 0.07) 0%,
                rgba(255, 220, 230, 0.06) 50%,
                rgba(255, 255, 255, 0.04) 100%
            );
            backdrop-filter: blur(30px) saturate(180%);
            -webkit-backdrop-filter: blur(30px) saturate(180%);
            border: 1px solid rgba(255, 182, 193, 0.2);
            border-radius: 36px;
            padding: 55px 50px 50px;
            max-width: 460px;
            width: 100%;
            text-align: center;
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.05),
                0 30px 60px rgba(0,0,0,0.5),
                0 0 60px rgba(232, 84, 122, 0.15),
                inset 0 1px 0 rgba(255,255,255,0.1);
            position: relative;
            animation: cardFloat 1.2s cubic-bezier(0.34, 1.56, 0.64, 1) both;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                135deg,
                rgba(255,182,193,0.05) 0%,
                transparent 50%,
                rgba(245,200,66,0.03) 100%
            );
            border-radius: inherit;
            pointer-events: none;
        }

        /* Glowing border pulse */
        .login-card::after {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 38px;
            background: linear-gradient(135deg, rgba(232,84,122,0.25), rgba(245,200,66,0.1), rgba(232,84,122,0.25));
            z-index: -1;
            animation: borderGlow 4s ease-in-out infinite;
        }
        @keyframes borderGlow {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        @keyframes cardFloat {
            from { opacity: 0; transform: translateY(50px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* === PULSING HEART ICON === */
        .love-icon {
            font-size: 72px;
            margin-bottom: 16px;
            display: inline-block;
            animation: heartPulse 2s ease-in-out infinite;
            filter: drop-shadow(0 0 18px rgba(232,84,122,0.7));
        }
        @keyframes heartPulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 18px rgba(232,84,122,0.7)); }
            30% { transform: scale(1.18); filter: drop-shadow(0 0 30px rgba(232,84,122,1)); }
            50% { transform: scale(1.05); }
            70% { transform: scale(1.15); }
        }

        /* === TYPOGRAPHY === */
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            color: #fff;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 20px rgba(232,84,122,0.4);
            line-height: 1.2;
            margin-bottom: 8px;
        }

        .tagline {
            font-family: 'Dancing Script', cursive;
            font-size: 21px;
            color: rgba(255, 182, 193, 0.9);
            margin-bottom: 10px;
        }

        /* === ROMANTIC DIVIDER === */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0 28px;
            padding: 0 10px;
        }
        .divider-line {
            flex: 1;
            height: 1px;
            background: linear-gradient(to right, transparent, rgba(255,182,193,0.4), transparent);
        }
        .divider-heart {
            font-size: 16px;
            animation: heartPulse 2s ease-in-out infinite;
        }

        /* === INPUT === */
        .input-group {
            position: relative;
            margin-bottom: 20px;
        }
        .input-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 18px;
            pointer-events: none;
            z-index: 2;
        }
        .password-input {
            width: 100%;
            padding: 18px 25px 18px 52px;
            font-size: 16px;
            font-family: 'Lato', sans-serif;
            border: 1.5px solid rgba(255, 182, 193, 0.2);
            border-radius: 50px;
            background: rgba(255, 255, 255, 0.07);
            color: #fff;
            letter-spacing: 4px;
            transition: all 0.4s ease;
            outline: none;
        }
        .password-input::placeholder {
            color: rgba(255, 182, 193, 0.5);
            letter-spacing: 1px;
        }
        .password-input:focus {
            border-color: rgba(232, 84, 122, 0.7);
            background: rgba(232, 84, 122, 0.08);
            box-shadow: 0 0 0 4px rgba(232,84,122,0.12), 0 0 30px rgba(232,84,122,0.15);
        }

        /* === SHIMMER BUTTON === */
        .unlock-btn {
            width: 100%;
            padding: 18px 40px;
            font-size: 15px;
            font-weight: 700;
            font-family: 'Lato', sans-serif;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #fff;
            background: linear-gradient(135deg, #e8547a 0%, #c0325a 40%, #e8547a 80%, #f06090 100%);
            background-size: 300% 100%;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow:
                0 8px 25px rgba(232, 84, 122, 0.5),
                0 2px 4px rgba(0,0,0,0.3),
                inset 0 1px 0 rgba(255,255,255,0.15);
            position: relative;
            overflow: hidden;
        }
        .unlock-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 60%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
            transform: skewX(-20deg);
            animation: shimmer 3s ease-in-out infinite;
        }
        @keyframes shimmer {
            0% { left: -100%; }
            60%, 100% { left: 150%; }
        }
        .unlock-btn:hover {
            background-position: 100% 0;
            transform: translateY(-3px);
            box-shadow: 0 16px 40px rgba(232,84,122,0.6), inset 0 1px 0 rgba(255,255,255,0.2);
        }
        .unlock-btn:active { transform: translateY(-1px); }

        /* === HINT === */
        .hint {
            margin-top: 28px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        /* === ERROR === */
        .error-msg {
            color: #ff8a8a;
            margin-top: 18px;
            font-family: 'Dancing Script', cursive;
            font-size: 17px;
            display: none;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }

        /* === CANDLE DECORATIONS === */
        .candles {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            padding: 0 20px;
            pointer-events: none;
        }
        .candle {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }
        .candle-flame {
            width: 10px; height: 14px;
            background: radial-gradient(ellipse at 50% 80%, #f5c842 30%, #e8547a 70%, transparent 100%);
            border-radius: 50% 50% 30% 30%;
            animation: flicker 1.5s ease-in-out infinite alternate;
            filter: blur(0.5px);
            box-shadow: 0 0 8px 2px rgba(245,200,66,0.6);
        }
        @keyframes flicker {
            0% { transform: scaleX(1) scaleY(1) rotate(-1deg); opacity: 0.9; }
            50% { transform: scaleX(0.85) scaleY(1.1) rotate(1deg); opacity: 1; }
            100% { transform: scaleX(1.1) scaleY(0.95) rotate(-2deg); opacity: 0.8; }
        }
        .candle-body {
            width: 9px; height: 34px;
            background: linear-gradient(180deg, #fff9e6 0%, #f0dfa0 50%, #e0c060 100%);
            border-radius: 2px 2px 3px 3px;
            box-shadow: inset -2px 0 4px rgba(0,0,0,0.1);
        }
        .candle-base {
            width: 13px; height: 5px;
            background: linear-gradient(180deg, #d4a050 0%, #a06020 100%);
            border-radius: 3px;
        }

        /* === QUOTE AT BOTTOM === */
        .love-quote {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }
        .love-quote p {
            font-family: 'Dancing Script', cursive;
            font-size: 17px;
            color: rgba(255, 182, 193, 0.5);
            letter-spacing: 0.5px;
        }

        /* === ADMIN LINK === */
        .admin-link {
            position: fixed;
            bottom: 16px;
            right: 18px;
            color: rgba(255, 255, 255, 0.1);
            font-size: 11px;
            text-decoration: none;
            transition: color 0.3s;
            z-index: 100;
        }
        .admin-link:hover { color: rgba(255, 255, 255, 0.35); }

        /* === LOADING SCREEN === */
        .loading-overlay {
            position: fixed; inset: 0;
            background: radial-gradient(ellipse at center, #3d0c20 0%, #1a0a10 60%, #0d0508 100%);
            display: flex; justify-content: center; align-items: center;
            z-index: 1000;
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        .loading-overlay.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(1.05);
        }
        .loader { text-align: center; }
        .loader-heart {
            font-size: 60px;
            animation: heartPulse 1s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(232,84,122,0.8));
        }
        .loader-text {
            color: rgba(255, 182, 193, 0.7);
            margin-top: 20px;
            font-family: 'Dancing Script', cursive;
            font-size: 24px;
        }
        .loader-dots { display: inline-flex; gap: 6px; margin-top: 18px; }
        .loader-dots span {
            width: 8px; height: 8px; border-radius: 50%;
            background: var(--rose);
            animation: dotBounce 1.2s ease-in-out infinite;
        }
        .loader-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loader-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotBounce {
            0%, 100% { transform: translateY(0); opacity: 0.4; }
            50% { transform: translateY(-10px); opacity: 1; }
        }

        @media (max-width: 480px) {
            .login-card { padding: 45px 28px 40px; border-radius: 28px; }
            h1 { font-size: 28px; }
            .love-icon { font-size: 58px; }
            .deco-top-left svg, .deco-top-right svg { width: 130px; height: auto; }
        }
    </style>
</head>
<body>

    <!-- Loading Screen -->
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loader">
            <div class="loader-heart">💕</div>
            <div class="loader-text">Loading our love story...</div>
            <div class="loader-dots"><span></span><span></span><span></span></div>
        </div>
    </div>

    <!-- Rose Petal Canvas -->
    <canvas id="petalCanvas"></canvas>

    <!-- Atmospheric Glow -->
    <div class="atmo-layer"></div>

    <!-- Stars Layer -->
    <div class="stars-layer" id="starsLayer"></div>

    <!-- Decorative SVG Corners -->
    <div class="deco-top-left">
        <svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M0,0 Q80,20 60,80 Q40,140 0,160 Z" fill="url(#g1)" opacity="0.5"/>
            <path d="M10,0 Q60,30 50,90 T0,180" stroke="rgba(232,84,122,0.3)" stroke-width="1.5" fill="none"/>
            <circle cx="60" cy="50" r="3" fill="rgba(245,200,66,0.5)"/>
            <circle cx="30" cy="100" r="2" fill="rgba(232,84,122,0.5)"/>
            <circle cx="70" cy="130" r="2.5" fill="rgba(245,200,66,0.4)"/>
            <!-- Tiny rose -->
            <g transform="translate(55,40) rotate(-20)" opacity="0.7">
                <ellipse cx="0" cy="0" rx="8" ry="10" fill="#c0325a"/>
                <ellipse cx="-5" cy="4" rx="6" ry="8" fill="#e8547a"/>
                <ellipse cx="5" cy="4" rx="6" ry="8" fill="#d04060"/>
                <ellipse cx="0" cy="8" rx="5" ry="7" fill="#ff6b90"/>
                <line x1="0" y1="12" x2="0" y2="28" stroke="#3a7a40" stroke-width="2"/>
                <ellipse cx="-6" cy="20" rx="7" ry="4" fill="#4a9a50" transform="rotate(-30,-6,20)"/>
            </g>
            <defs>
                <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0%" stop-color="#e8547a" stop-opacity="0.3"/>
                    <stop offset="100%" stop-color="#3d0c20" stop-opacity="0"/>
                </linearGradient>
            </defs>
        </svg>
    </div>
    <div class="deco-top-right">
        <svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M0,0 Q80,20 60,80 Q40,140 0,160 Z" fill="url(#g2)" opacity="0.5"/>
            <path d="M10,0 Q60,30 50,90 T0,180" stroke="rgba(232,84,122,0.3)" stroke-width="1.5" fill="none"/>
            <circle cx="60" cy="50" r="3" fill="rgba(245,200,66,0.5)"/>
            <circle cx="30" cy="100" r="2" fill="rgba(232,84,122,0.5)"/>
            <g transform="translate(55,40) rotate(-20)" opacity="0.7">
                <ellipse cx="0" cy="0" rx="8" ry="10" fill="#c0325a"/>
                <ellipse cx="-5" cy="4" rx="6" ry="8" fill="#e8547a"/>
                <ellipse cx="5" cy="4" rx="6" ry="8" fill="#d04060"/>
                <ellipse cx="0" cy="8" rx="5" ry="7" fill="#ff6b90"/>
                <line x1="0" y1="12" x2="0" y2="28" stroke="#3a7a40" stroke-width="2"/>
                <ellipse cx="-6" cy="20" rx="7" ry="4" fill="#4a9a50" transform="rotate(-30,-6,20)"/>
            </g>
            <defs>
                <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0%" stop-color="#e8547a" stop-opacity="0.3"/>
                    <stop offset="100%" stop-color="#3d0c20" stop-opacity="0"/>
                </linearGradient>
            </defs>
        </svg>
    </div>
    <div class="deco-bottom-left">
        <svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M0,0 Q80,20 60,80 Q40,140 0,160 Z" fill="url(#g3)" opacity="0.4"/>
            <circle cx="60" cy="50" r="3" fill="rgba(245,200,66,0.5)"/>
            <defs>
                <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0%" stop-color="#e8547a" stop-opacity="0.25"/>
                    <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
                </linearGradient>
            </defs>
        </svg>
    </div>
    <div class="deco-bottom-right">
        <svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M0,0 Q80,20 60,80 Q40,140 0,160 Z" fill="url(#g4)" opacity="0.4"/>
            <defs>
                <linearGradient id="g4" x1="0" y1="0" x2="1" y2="1">
                    <stop offset="0%" stop-color="#e8547a" stop-opacity="0.25"/>
                    <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
                </linearGradient>
            </defs>
        </svg>
    </div>

    <!-- Main Login -->
    <div class="login-wrapper">
        <!-- Decorative rose above card -->
        <div class="hero-rose">
            <svg width="140" height="100" viewBox="0 0 140 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                <!-- Left rose -->
                <g transform="translate(18, 18) rotate(-30)">
                    <ellipse cx="0" cy="0" rx="10" ry="13" fill="#c0325a"/>
                    <ellipse cx="-6" cy="5" rx="8" ry="11" fill="#e8547a"/>
                    <ellipse cx="6" cy="5" rx="8" ry="11" fill="#d04060"/>
                    <ellipse cx="0" cy="10" rx="7" ry="9" fill="#ff6b90"/>
                    <ellipse cx="0" cy="2" rx="4" ry="5" fill="#ff8aaa"/>
                    <line x1="0" y1="16" x2="-4" y2="38" stroke="#2d6e30" stroke-width="2.5"/>
                    <ellipse cx="-12" cy="30" rx="10" ry="5" fill="#3a8042" transform="rotate(-40,-12,30)"/>
                    <ellipse cx="3" cy="34" rx="9" ry="4" fill="#2d6e30" transform="rotate(20,3,34)"/>
                </g>
                <!-- Center heart -->
                <g transform="translate(70, 10)">
                    <path d="M0,8 C0,-2 -14,-6 -14,4 C-14,14 0,22 0,22 C0,22 14,14 14,4 C14,-6 0,-2 0,8 Z" fill="#e8547a"/>
                    <path d="M0,5 C0,-1 -9,-3 -9,3 C-9,8 0,14 0,14 C0,14 9,8 9,3 C9,-3 0,-1 0,5 Z" fill="#ff8aaa" opacity="0.5"/>
                </g>
                <!-- Right rose -->
                <g transform="translate(122, 18) rotate(30)">
                    <ellipse cx="0" cy="0" rx="10" ry="13" fill="#c0325a"/>
                    <ellipse cx="-6" cy="5" rx="8" ry="11" fill="#e8547a"/>
                    <ellipse cx="6" cy="5" rx="8" ry="11" fill="#d04060"/>
                    <ellipse cx="0" cy="10" rx="7" ry="9" fill="#ff6b90"/>
                    <ellipse cx="0" cy="2" rx="4" ry="5" fill="#ff8aaa"/>
                    <line x1="0" y1="16" x2="4" y2="38" stroke="#2d6e30" stroke-width="2.5"/>
                    <ellipse cx="12" cy="30" rx="10" ry="5" fill="#3a8042" transform="rotate(40,12,30)"/>
                    <ellipse cx="-3" cy="34" rx="9" ry="4" fill="#2d6e30" transform="rotate(-20,-3,34)"/>
                </g>
                <!-- Sparkles -->
                <text x="48" y="18" font-size="10" fill="rgba(245,200,66,0.8)">✦</text>
                <text x="88" y="45" font-size="8" fill="rgba(245,200,66,0.6)">✦</text>
                <text x="34" y="50" font-size="7" fill="rgba(255,182,193,0.7)">✦</text>
            </svg>
        </div>

        <div class="login-card">
            <div class="love-icon">💖</div>
            <h1>Welcome My Love</h1>
            <p class="tagline">Our secret garden awaits you</p>

            <div class="divider">
                <span class="divider-line"></span>
                <span class="divider-heart">🌹</span>
                <span class="divider-line"></span>
            </div>

            <div class="input-group">
                <span class="input-icon">🔑</span>
                <input
                    type="password"
                    class="password-input"
                    id="passwordInput"
                    placeholder="Enter our secret..."
                    autocomplete="off"
                >
            </div>

            <button class="unlock-btn" onclick="checkPassword()" id="unlockBtn">
                ✨ Open Our Story ✨
            </button>

            <p class="hint">
                <span>💡</span>
                Hint: The day we first met (DDMMYYYY)
            </p>

            <p class="error-msg" id="errorMsg">
                💔 That's not quite right, my love! Try again...
            </p>

            <!-- Candle decorations -->
            <div class="candles">
                <div class="candle">
                    <div class="candle-flame" style="animation-delay: 0.3s"></div>
                    <div class="candle-body"></div>
                    <div class="candle-base"></div>
                </div>
                <div class="candle">
                    <div class="candle-flame" style="animation-delay: 0.7s; width: 8px; height: 11px;"></div>
                    <div class="candle-body" style="height: 24px;"></div>
                    <div class="candle-base"></div>
                </div>
                <div class="candle">
                    <div class="candle-flame" style="animation-delay: 0.1s"></div>
                    <div class="candle-body" style="height: 40px;"></div>
                    <div class="candle-base"></div>
                </div>
                <div class="candle">
                    <div class="candle-flame" style="animation-delay: 0.5s; width: 8px; height: 11px;"></div>
                    <div class="candle-body" style="height: 26px;"></div>
                    <div class="candle-base"></div>
                </div>
                <div class="candle">
                    <div class="candle-flame" style="animation-delay: 0.9s"></div>
                    <div class="candle-body"></div>
                    <div class="candle-base"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Floating love quote -->
    <div class="love-quote">
        <p id="rotatingQuote">"Every love story is beautiful, but ours is my favorite"</p>
    </div>

    <a href="admin.html" class="admin-link">Admin</a>

    <script src="js/storage.js"></script>
    <script>
        // === STARS ===
        function createStars() {
            const container = document.getElementById('starsLayer');
            for (let i = 0; i < 120; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 2.5 + 0.5;
                star.style.cssText = `
                    left: ${Math.random() * 100}%;
                    top: ${Math.random() * 100}%;
                    width: ${size}px;
                    height: ${size}px;
                    --dur: ${Math.random() * 4 + 2}s;
                    animation-delay: ${Math.random() * 5}s;
                `;
                container.appendChild(star);
            }
        }

        // === ROSE PETAL CANVAS ANIMATION ===
        function initPetals() {
            const canvas = document.getElementById('petalCanvas');
            const ctx = canvas.getContext('2d');
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            });

            const petals = [];
            const colors = ['#e8547a', '#c0325a', '#ff8aaa', '#ffb3c8', '#f5c842'];

            class Petal {
                constructor() { this.reset(); }
                reset() {
                    this.x = Math.random() * canvas.width;
                    this.y = -30;
                    this.size = Math.random() * 10 + 5;
                    this.speedY = Math.random() * 1.2 + 0.4;
                    this.speedX = (Math.random() - 0.5) * 1.5;
                    this.angle = Math.random() * Math.PI * 2;
                    this.rotSpeed = (Math.random() - 0.5) * 0.06;
                    this.opacity = Math.random() * 0.5 + 0.2;
                    this.color = colors[Math.floor(Math.random() * colors.length)];
                    this.wobble = Math.random() * Math.PI * 2;
                    this.wobbleSpeed = Math.random() * 0.04 + 0.01;
                }
                update() {
                    this.y += this.speedY;
                    this.wobble += this.wobbleSpeed;
                    this.x += this.speedX + Math.sin(this.wobble) * 0.8;
                    this.angle += this.rotSpeed;
                    if (this.y > canvas.height + 30) this.reset();
                }
                draw() {
                    ctx.save();
                    ctx.translate(this.x, this.y);
                    ctx.rotate(this.angle);
                    ctx.globalAlpha = this.opacity;
                    ctx.fillStyle = this.color;
                    // Draw petal shape
                    ctx.beginPath();
                    ctx.ellipse(0, 0, this.size * 0.5, this.size, 0, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }
            }

            // Create petals
            for (let i = 0; i < 55; i++) {
                const p = new Petal();
                p.y = Math.random() * canvas.height; // start scattered
                petals.push(p);
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                petals.forEach(p => { p.update(); p.draw(); });
                requestAnimationFrame(animate);
            }
            animate();
        }

        // === ROTATING QUOTES ===
        const quotes = [
            '"Every love story is beautiful, but ours is my favorite"',
            '"You are my sun, my moon, and all of my stars"',
            '"In all the world, there is no heart for me like yours"',
            '"I love you not only for what you are, but for what I am with you"',
            '"You are the finest, loveliest, tenderest person I have ever known"',
        ];
        let qIdx = 0;
        function rotateQuote() {
            const el = document.getElementById('rotatingQuote');
            el.style.opacity = '0';
            setTimeout(() => {
                qIdx = (qIdx + 1) % quotes.length;
                el.textContent = quotes[qIdx];
                el.style.transition = 'opacity 1s ease';
                el.style.opacity = '1';
            }, 600);
        }

        // === PASSWORD CHECK ===
        async function checkPassword() {
            const input = document.getElementById('passwordInput').value;
            const errorMsg = document.getElementById('errorMsg');
            const btn = document.getElementById('unlockBtn');

            const config = await LoveStorage.getConfig();
            const correctPassword = config?.password || '17042024';

            if (input === correctPassword) {
                btn.textContent = '💕 Opening...';
                btn.style.background = 'linear-gradient(135deg, #4CAF50, #2E7D32)';
                document.body.style.transition = 'opacity 1s ease';
                document.body.style.opacity = '0';
                setTimeout(() => { window.location.href = 'home.html'; }, 1000);
            } else {
                errorMsg.style.display = 'block';
                errorMsg.style.animation = 'none';
                void errorMsg.offsetWidth;
                errorMsg.style.animation = 'shake 0.5s ease';
                document.getElementById('passwordInput').value = '';
                document.getElementById('passwordInput').focus();
            }
        }

        // Enter key support
        document.getElementById('passwordInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkPassword();
        });

        // Hide error on type
        document.getElementById('passwordInput').addEventListener('input', () => {
            document.getElementById('errorMsg').style.display = 'none';
        });

        // === INITIALIZE ===
        document.addEventListener('DOMContentLoaded', () => {
            createStars();
            initPetals();
            setInterval(rotateQuote, 5000);

            setTimeout(() => {
                document.getElementById('loadingOverlay').classList.add('hidden');
            }, 1600);
        });
    </script>
</body>
</html>
